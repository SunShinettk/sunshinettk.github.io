<!DOCTYPE html>
<html lang="pt-br">

<meta charset="UTF-8">

<!-- ÍCONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  overflow: hidden;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FUNDO ANIMADO */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #ff0080 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveBg 20s linear infinite;
  opacity: 0.1;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* CARD */
.card {
  position: relative;
  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 30px;
  width: 300px;
  text-align: center;
  border: 2px solid #ff0080;
  box-shadow: 0 0 30px #ff0080;
  animation: fadeIn 1s ease, glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #ff0080; }
  to { box-shadow: 0 0 30px #ff0080; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* FOTO */
.profile {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #ff0080;
  box-shadow: 0 0 20px #ff0080;
  margin-bottom: 15px;
}

/* BOTÕES */
.link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 12px 0;
  padding: 14px;
  border-radius: 20px;
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.6);
  font-weight: bold;
  transition: 0.25s;
}

.link i {
  font-size: 18px;
}

/* HOVER */
.link:hover {
  transform: scale(1.06);
  box-shadow: 0 0 20px #ff0080;
  background: rgba(0,0,0,0.8);
}

.link:active {
  transform: scale(0.95);
}

/* TEXTO FINAL */
.footer {
  margin-top: 18px;
  font-size: 12px;
  color: #ff0080;
  letter-spacing: 2px;
}
</style>
</head>
